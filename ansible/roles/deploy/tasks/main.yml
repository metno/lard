---
- name: Create lard group
  ansible.builtin.group:
    name: lard
    state: present

- name: Create lard user
  ansible.builtin.user:
    name: lard
    groups: lard
    shell: /sbin/nologin
    append: yes
    state: present
    create_home: no

- name: Copy files to server
  ansible.builtin.copy:
    src: "{{ item.src }}"
    dest: "{{ item.dest }}"
    mode: "{{ item.mode }}"
    owner: root
    group: root
  loop: "{{ files }}"
  vars:
    files:
      - src: lard_ingestion.service
        dest: /etc/systemd/system
        mode: preserve
      - src: lard_ingestion
        dest: /usr/local/bin
        mode: "0755"
      - src: resources
        dest: /usr/local/bin
        mode: "0755"

  # - name: Clean logs
  #   ansible.builtin.command: journalctl {{ item }}
  #   with_items:
  #     - "--rotate"
  #     - "--vacuum-time=1s"
  # become: yes

- name: Import environment variables
  ansible.builtin.command: systemctl import-environment LARD_STRING STINFO_STRING
  environment: "{{ envars }}"
  become: yes

- name: Start LARD ingestion service
  ansible.builtin.systemd:
    daemon_reload: true
    name: lard_ingestion
    state: restarted
    enabled: yes

- name: Unset environment variables
  ansible.builtin.command: systemctl unset-environment LARD_STRING STINFO_STRING
  become: yes
